    </linearGradient>
    <linearGradient id="lens" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5e4533" stop-opacity="0.94"/>
      <stop offset="100%" stop-color="#2b1d15" stop-opacity="0.94"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="1200" fill="url(#bg)"/>
  <circle cx="930" cy="260" r="170" fill="#ffffff" opacity="0.12"/>
